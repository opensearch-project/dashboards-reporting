name: Test and Build OpenSearch Dashboards Reports

on: [pull_request, push]

env:
  PLUGIN_NAME: reportsDashboards
  ARTIFACT_NAME: reports-dashboards
  OPENSEARCH_DASHBOARDS_VERSION: 'main'

jobs:
  Get-CI-Image-Tag:
    uses: opensearch-project/opensearch-build/.github/workflows/get-ci-image-tag.yml@761e093b8c1349cc07f21c1d681d3b30bf9e1999 # main
    with:
      product: opensearch-dashboards

  linux-build:
    needs: Get-CI-Image-Tag
    runs-on: ubuntu-latest
    container:
      # using the same image which is used by opensearch-build team to build the OpenSearch Distribution
      # this image tag is subject to change as more dependencies and updates will arrive over time
      image: ${{ needs.Get-CI-Image-Tag.outputs.ci-image-version-linux }}
      # need to switch to root so that github actions can install runner binary on container without permission issues.
      options: --user root

    steps:
      - name: Checkout OpenSearch Dashboards
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: opensearch-project/Opensearch-Dashboards
          ref: ${{ env.OPENSEARCH_DASHBOARDS_VERSION }}
          path: OpenSearch-Dashboards

      - name: Checkout Plugin
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: OpenSearch-Dashboards/plugins/${{ env.PLUGIN_NAME }}

      - name: Set env
        run: |
          opensearch_version=$(node -p "require('./opensearch_dashboards.json').opensearchDashboardsVersion")
          plugin_version=$(node -p "require('./opensearch_dashboards.json').version")
          echo "OPENSEARCH_VERSION=$opensearch_version" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=$plugin_version" >> $GITHUB_ENV
        shell: bash
        working-directory: OpenSearch-Dashboards/plugins/${{ env.PLUGIN_NAME }}

      - name: OpenSearch Dashboards Plugin Bootstrap and test
        uses: nick-fields/retry@39da88d5f7d15a96aed861dbabbe8b7443e3182a # v1
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: |
            chown -R 1000:1000 `pwd`
            cd ./OpenSearch-Dashboards/
            su `id -un 1000` -c "source $NVM_DIR/nvm.sh && nvm install && nvm use && \
                                 npm i -g corepack && corepack install && \
                                 node -v && yarn -v && \
                                 cd ./plugins/${{ env.PLUGIN_NAME }} && \
                                 whoami && yarn osd bootstrap --single-version=loose && yarn test --coverage"

      - name: Upload coverage
        uses: codecov/codecov-action@29386c70ef20e286228c72b668a06fd0e8399192 # v1
        with:
          flags: dashboards-report
          directory: ./OpenSearch-Dashboards/plugins/
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build Artifact
        run: |
          chown -R 1000:1000 `pwd`
          cd ./OpenSearch-Dashboards/
          su `id -un 1000` -c "source $NVM_DIR/nvm.sh && nvm install && nvm use && \
                               npm i -g corepack && corepack install && \
                               node -v && yarn -v && \
                               cd ./plugins/${{ env.PLUGIN_NAME }} && \
                               whoami && yarn build && mv -v ./build/*.zip ./build/${{ env.ARTIFACT_NAME }}-${{ env.PLUGIN_VERSION }}.zip"

      - name: Upload Artifact For Linux
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: dashboards-reports-linux
          path: ./OpenSearch-Dashboards/plugins/${{ env.PLUGIN_NAME }}/build/${{ env.ARTIFACT_NAME }}-${{ env.PLUGIN_VERSION }}.zip

  windows-mac-builds:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Enable longer filenames (Windows only)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout OpenSearch Dashboards
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: opensearch-project/Opensearch-Dashboards
          ref: ${{ env.OPENSEARCH_DASHBOARDS_VERSION }}
          path: OpenSearch-Dashboards

      - name: Setup Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version-file: 'OpenSearch-Dashboards/.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Yarn
        shell: bash
        run: |
          YARN_VERSION=$(node -p "require('./OpenSearch-Dashboards/package.json').engines.yarn")
          echo "Installing yarn@$YARN_VERSION"
          npm i -g yarn@$YARN_VERSION

      - run: node -v
      - run: yarn -v

      - name: Checkout Plugin
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: OpenSearch-Dashboards/plugins/${{ env.PLUGIN_NAME }}

      - name: Set env
        run: |
          opensearch_version=$(node -p "require('./opensearch_dashboards.json').opensearchDashboardsVersion")
          plugin_version=$(node -p "require('./opensearch_dashboards.json').version")
          echo "OPENSEARCH_VERSION=$opensearch_version" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=$plugin_version" >> $GITHUB_ENV
        shell: bash
        working-directory: OpenSearch-Dashboards/plugins/${{ env.PLUGIN_NAME }}

      - name: OpenSearch Dashboards Plugin Bootstrap
        uses: nick-fields/retry@39da88d5f7d15a96aed861dbabbe8b7443e3182a # v1
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: cd OpenSearch-Dashboards && yarn osd bootstrap --single-version=loose

      - name: Test
        uses: nick-fields/retry@39da88d5f7d15a96aed861dbabbe8b7443e3182a # v1
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: cd OpenSearch-Dashboards/plugins/${{ env.PLUGIN_NAME }} && yarn test

      - name: Build Artifact
        run: |
          cd ./OpenSearch-Dashboards/plugins/${{ env.PLUGIN_NAME }} && yarn build
          mv ./build/*.zip ./build/${{ env.ARTIFACT_NAME }}-${{ env.PLUGIN_VERSION }}-${{ runner.os }}.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: dashboards-reports-${{ runner.os }}
          path: ./OpenSearch-Dashboards/plugins/${{ env.PLUGIN_NAME }}/build/${{ env.ARTIFACT_NAME }}-${{ env.PLUGIN_VERSION }}-${{ runner.os }}.zip
